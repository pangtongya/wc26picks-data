name: Update World Cup Matches Data

on:
  schedule:
    # 每 30 分钟运行一次（UTC 时间）- 降低频率避免被限制
    - cron: '*/30 * * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [ main ]

jobs:
  update-matches:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # 需要写入权限来提交更改
    
    steps:
    - name: 📊 检出代码
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 🐍 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: 🚀 运行更新脚本
      run: python3 update_matches.py
      
    - name: 💾 提交并推送更改（如果数据有更新）
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 检查是否有更改
        if [[ -n $(git status -s matches.json) ]]; then
          echo "📝 检测到数据更新，提交更改..."
          git add matches.json
          git commit -m "🤖 自动更新比赛数据 $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
          echo "✅ 更改已推送"
        else
          echo "✅ 数据无变化，无需提交"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
